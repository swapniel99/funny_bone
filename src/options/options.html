<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Funny Bone Settings</title>
  <link rel="stylesheet" href="options.css">
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>Extension Settings</h1>
      <p class="subtitle">Configure your AI roast preferences.</p>
    </div>

    <div class="settings-card">
      <div class="form-group">
        <label for="apiKey">OpenAI API Key</label>
        <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off">
        <span class="help-text">Your key is stored locally on your device.</span>
      </div>

      <div class="form-group">
        <label for="modelName">Model</label>
        <input type="text" id="modelName" placeholder="e.g. gpt-4.1-nano" value="gpt-4.1-nano">
        <span class="help-text">Default: gpt-4.1-nano</span>
      </div>

      <div class="form-group row">
        <input type="checkbox" id="colorizeToggle" checked>
        <label for="colorizeToggle">Colorize Roasted Text</label>
      </div>

      <button id="saveBtn" class="primary-btn">Save Settings</button>
      <div id="statusMessage" class="status hidden">Settings saved!</div>
    </div>
  </div>
  <script src="options.js"></script>
</body>

</html>
