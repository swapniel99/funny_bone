<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Funny Bone</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div style="display: flex; justify-content: space-between; align-items: start;">
        <div>
          <h1>Funny Bone</h1>
          <p class="subtitle">Roast this page</p>
        </div>
        <button id="settingsBtn" title="Extension Settings">⚙️</button>
      </div>
    </div>
    
    <div class="control-group">
      <label class="toggle">
        <input type="checkbox" id="globalToggle">
        <span class="slider"></span>
      </label>
      <span class="toggle-label">Auto-Roast Enabled</span>
    </div>

    <button id="roastBtn" class="action-btn" disabled>Roast Current Page</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
